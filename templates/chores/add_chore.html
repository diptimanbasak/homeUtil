{% extends "base.html" %}
{% block title %}Add Chore{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="/chores">Chores</a>
    <span>›</span> Add Chore
</div>

<div class="page-header">
    <h1>Add Chore</h1>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="card" style="max-width:600px;">
    <form method="post" action="/chores/new">
        <div class="form-group">
            <label class="form-label" for="name">Chore Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Vacuum living room" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="category">Category</label>
                <select id="category" name="category" class="form-control">
                    {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="frequency">Frequency</label>
                <select id="frequency" name="frequency" class="form-control">
                    {% for key, label in frequencies.items() %}
                    <option value="{{ key }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="assigned_to">Assigned To</label>
            <input type="text" id="assigned_to" name="assigned_to" class="form-control" placeholder="e.g. Mom, Dad, Everyone">
        </div>

        <div class="form-group">
            <label class="form-label" for="notes">Notes</label>
            <textarea id="notes" name="notes" class="form-control" rows="3" placeholder="Any extra details..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Chore</button>
            <a href="/chores" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

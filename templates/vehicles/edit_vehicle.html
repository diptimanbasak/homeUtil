{% extends "base.html" %}
{% block title %}Edit {{ vehicle.make }} {{ vehicle.model }}{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="/vehicles">Vehicles</a>
    <span>›</span> <a href="/vehicles/{{ vehicle.id }}">{{ vehicle.year }} {{ vehicle.make }} {{ vehicle.model }}</a>
    <span>›</span> Edit
</div>

<div class="page-header">
    <h1>Edit Vehicle</h1>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="card" style="max-width:600px;">
    <form method="post" action="/vehicles/{{ vehicle.id }}/edit">
        <div class="form-group">
            <label class="form-label" for="nickname">Nickname</label>
            <input type="text" id="nickname" name="nickname" class="form-control" value="{{ vehicle.nickname or '' }}">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="make">Make <span class="required">*</span></label>
                <input type="text" id="make" name="make" class="form-control" value="{{ vehicle.make }}" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="model">Model <span class="required">*</span></label>
                <input type="text" id="model" name="model" class="form-control" value="{{ vehicle.model }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="year">Year <span class="required">*</span></label>
                <input type="number" id="year" name="year" class="form-control" value="{{ vehicle.year }}" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="color">Color</label>
                <input type="text" id="color" name="color" class="form-control" value="{{ vehicle.color or '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="license_plate">License Plate</label>
                <input type="text" id="license_plate" name="license_plate" class="form-control" value="{{ vehicle.license_plate or '' }}">
            </div>
            <div class="form-group">
                <label class="form-label" for="vin">VIN</label>
                <input type="text" id="vin" name="vin" class="form-control" maxlength="17" value="{{ vehicle.vin or '' }}">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="current_mileage">Current Mileage</label>
            <input type="number" id="current_mileage" name="current_mileage" class="form-control" value="{{ vehicle.current_mileage or 0 }}">
        </div>

        <div class="form-group">
            <label class="form-label" for="notes">Notes</label>
            <textarea id="notes" name="notes" class="form-control" rows="3">{{ vehicle.notes or '' }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/vehicles/{{ vehicle.id }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

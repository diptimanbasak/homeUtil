{% extends "base.html" %}
{% block title %}Edit Expense{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="/expenses">Expenses</a>
    <span>›</span> <a href="/expenses/{{ expense.id }}">{{ expense.vendor or "Expense" }}</a>
    <span>›</span> Edit
</div>

<div class="page-header">
    <h1>Edit Expense</h1>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="card" style="max-width:600px;">
    <form method="post" action="/expenses/{{ expense.id }}/edit">
        <div class="form-group">
            <label class="form-label" for="vendor">Vendor</label>
            <input type="text" id="vendor" name="vendor" class="form-control" value="{{ expense.vendor or '' }}">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="amount">Amount</label>
                <input type="number" step="0.01" id="amount" name="amount" class="form-control" value="{{ expense.amount if expense.amount is not none else '' }}">
            </div>
            <div class="form-group">
                <label class="form-label" for="expense_date">Date</label>
                <input type="date" id="expense_date" name="expense_date" class="form-control" value="{{ expense.expense_date.isoformat() if expense.expense_date else '' }}">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="category">Category</label>
            <select id="category" name="category" class="form-control">
                {% for cat in categories %}
                <option value="{{ cat }}" {% if cat == expense.category %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="notes">Notes</label>
            <textarea id="notes" name="notes" class="form-control" rows="3">{{ expense.notes or '' }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/expenses/{{ expense.id }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
